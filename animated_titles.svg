<svg width="600" height="60" viewBox="0 0 600 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyberpunk Blue Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes glitch {
      0%   { opacity: 0; transform: scale(0.95); }
      3%   { opacity: 1; transform: scale(1.02); }
      6%   { transform: scale(1); }
      20%  { opacity: 1; }
      23%  { opacity: 0.3; }
      25%  { opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes pulseColor {
      0%   { fill: #3b82f6; }
      50%  { fill: #93c5fd; }
      100% { fill: #3b82f6; }
    }

    .cyber-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: central;
      letter-spacing: 2px;
      opacity: 0;
      animation: glitch 12s infinite, pulseColor 3s infinite;
      filter: url(#neonGlow);
    }
    
    .t1 { animation-delay: 0s, 0s; }
    .t2 { animation-delay: 3s, 0s; }
    .t3 { animation-delay: 6s, 0s; }
    .t4 { animation-delay: 9s, 0s; }
    
    /* Terminal blinking square cursor */
    .cursor {
      animation: blink 0.5s infinite step-start;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>

  <g transform="translate(300, 30)">
    <text class="cyber-text t1">FULL-STACK WEB DEVELOPER<tspan class="cursor">&#9608;</tspan></text>
    <text class="cyber-text t2">IOT &amp; HARDWARE ENTHUSIAST<tspan class="cursor">&#9608;</tspan></text>
    <text class="cyber-text t3">SYSTEM ARCHITECTURE THINKER<tspan class="cursor">&#9608;</tspan></text>
    <text class="cyber-text t4">CONTINUOUS FAST LEARNER<tspan class="cursor">&#9608;</tspan></text>
  </g>
</svg>
